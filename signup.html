<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your free Novio account and start learning tech skills today.">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign Up | Novio</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Novio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navbarOffcanvas"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="navbarOffcanvas">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Novio</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto me-3">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-2">
                        <a href="cart.html" class="btn btn-icon position-relative" aria-label="Cart">
                            <i class="bi bi-cart3"></i>
                            <span class="cart-badge badge" data-count="0">0</span>
                        </a>
                        <a href="login.html" class="btn btn-outline-primary btn-sm" id="loginBtn">Log In</a>
                        <a href="signup.html" class="btn btn-primary btn-sm" id="signupBtn">Sign Up</a>
                        <a href="account.html" class="btn btn-icon d-none" id="accountBtn" aria-label="Account">
                            <i class="bi bi-person-circle"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">Novio</div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join 50K+ learners and start your journey</p>

            <form id="signupForm" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="signupName">Full Name</label>
                    <input type="text" class="form-control" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="signupEmail">Email Address</label>
                    <input type="email" class="form-control" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="signupPhone">Phone Number <span
                            class="text-muted">(optional)</span></label>
                    <input type="tel" class="form-control" id="signupPhone" placeholder="+1 (555) 000-0000">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="signupPassword">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="signupPassword" placeholder="Min. 8 characters"
                            required minlength="8">
                        <button class="btn btn-toggle-password" type="button" aria-label="Toggle password visibility">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="progress mt-2">
                            <div class="progress-bar" id="strengthBar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <small id="strengthText"></small>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="signupConfirmPassword"
                            placeholder="Repeat your password" required minlength="8">
                        <button class="btn btn-toggle-password" type="button" aria-label="Toggle password visibility">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                    <label class="form-check-label small" for="agreeTerms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </section>

    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
